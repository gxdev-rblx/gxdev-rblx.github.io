<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Me</title>
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* General styles */
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #6a0dad, #8e44ad);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      background: rgba(0, 0, 0, 0.4);
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      max-width: 400px;
      width: 90%;
    }

    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      margin-bottom: 20px;
    }

    h1 {
      margin: 10px 0;
      font-size: 2.5em;
    }

    p {
      font-size: 1.1em;
      margin-bottom: 30px;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 10px 0;
      text-decoration: none;
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      background: #9b59b6;
      transition: background 0.3s, transform 0.3s;
      gap: 10px;
      font-size: 1em;
    }

    .links a:hover {
      background: #7d3c98;
      transform: translateY(-3px);
    }

    .social-icons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 15px;
      font-size: 1.5em;
    }

    .social-icons a {
      color: #fff;
      transition: color 0.3s, transform 0.3s;
    }

    .social-icons a:hover {
      color: #ffd700;
      transform: translateY(-3px);
    }

    footer {
      margin-top: 30px;
      font-size: 0.9em;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Profile Picture -->
    <img src="https://ibb.co/xqrqLqgP" alt="Profile Picture" class="profile-pic">

    <h1>Penguin Jason's Lair</h1>
    <p>This is my hideout.Check out my channels and socials below.</p>
    
    <!-- Links -->
    <div class="links">
      <a href="https://www.youtube.com/@YourChannel" target="_blank">
        <i class="fab fa-youtube"></i> YouTube Channel
      </a>
      <a href="https://t.me/funapilla" target="_blank">
        <i class="fab fa-telegram"></i> Telegram Channel
      </a>
      <a href="https://t.me/Red01ma" target="_blank">
        <i class="fab fa-telegram"></i> Telegram Profile
      </a>
      <a href="https://twitter.com/YourProfile" target="_blank">
        <i class="fab fa-twitter"></i> Twitter
      </a>
    </div>

    <!-- Social Icons -->
    <div class="social-icons">
      <a href="https://www.youtube.com/@YourChannel" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="https://t.me/funapilla" target="_blank"><i class="fab fa-telegram"></i></a>
      <a href="https://t.me/Red01ma" target="_blank"><i class="fab fa-telegram"></i></a>
      <a href="https://twitter.com/YourProfile" target="_blank"><i class="fab fa-twitter"></i></a>
    </div>

    <footer>
      &copy; 2026 Penguin Jason. All rights reserved.
    </footer>
  </div>
</body>
</html>
